<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gestión de Multas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #fff;
    margin: 0;
}

header {
    background: #1e293b;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
}

.container {
    padding: 20px;
}

input, select, button {
    padding: 8px;
    border-radius: 6px;
    border: none;
}

button {
    background: #2563eb;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #1d4ed8;
}

.table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
}

.table th, .table td {
    padding: 10px;
    border-bottom: 1px solid #334155;
    text-align: center;
}

.table th {
    background: #1e293b;
}

.badge {
    padding: 4px 8px;
    border-radius: 5px;
}

.pendiente { background: orange; }
.pagada { background: green; }
.anulada { background: red; }

.topbar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 15px;
}

.pagination {
    margin-top: 15px;
    text-align: center;
}

.modal {
    display: none;
    position: fixed;
    background: rgba(0,0,0,0.8);
    top: 0; left: 0;
    width: 100%; height: 100%;
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
    width: 400px;
}

.modal-content input, .modal-content select {
    width: 100%;
    margin-bottom: 10px;
}
</style>

</head>

<body>

<header>🚓 Gestión de Multas</header>

<div class="container">

<div class="topbar">
    <input type="text" id="search" placeholder="Buscar matrícula, DNI...">

```
<select id="estado">
    <option value="">Todos</option>
    <option>Pendiente pago</option>
    <option>Pagada</option>
    <option>Anulada</option>
</select>

<button onclick="loadMultas()">Buscar</button>
<button onclick="openModal()">+ Nueva Multa</button>
```

</div>

<table class="table">
<thead>
<tr>
    <th>ID</th>
    <th>Matrícula</th>
    <th>DNI</th>
    <th>Descripción</th>
    <th>Importe</th>
    <th>Puntos</th>
    <th>Estado</th>
    <th>Acciones</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

<div class="pagination">
    <button onclick="prevPage()">◀</button>
    <span id="pageInfo"></span>
    <button onclick="nextPage()">▶</button>
</div>

</div>

<!-- MODAL -->

<div class="modal" id="modal">
<div class="modal-content">
    <h3>Nueva Multa</h3>

```
<input id="matricula" placeholder="Matrícula (opcional)">
<input id="dni" placeholder="DNI (opcional)">

<select id="codigo">
    <option>Cargando...</option>
</select>

<input id="agente" placeholder="Agente Nº">
<input id="municipio" placeholder="Municipio">
<input id="via" placeholder="Vía">

<button onclick="crearMulta()">Guardar</button>
<button onclick="closeModal()">Cancelar</button>
```

</div>
</div>

<script>
let page = 0;

async function loadMultas() {
    let q = document.getElementById("search").value;
    let estado = document.getElementById("estado").value;

    let res = await fetch(`/api/policia/multas?q=${q}&estado=${estado}&page=${page}`);
    let data = await res.json();

    let html = "";
    data.rows.forEach(m => {
        html += `
        <tr>
            <td>${m.id}</td>
            <td>${m.matricula || ""}</td>
            <td>${m.dni || ""}</td>
            <td>${m.descripcion}</td>
            <td>${m.importe}€</td>
            <td>${m.puntos_retirados}</td>
            <td><span class="badge ${m.estado.toLowerCase().replace(" ","")}">${m.estado}</span></td>
            <td>
                <button onclick="cambiarEstado(${m.id}, 'Pagada')">✔</button>
                <button onclick="cambiarEstado(${m.id}, 'Anulada')">✖</button>
            </td>
        </tr>
        `;
    });

    document.getElementById("tabla").innerHTML = html;
    document.getElementById("pageInfo").innerText = `Página ${page+1}`;
}

function nextPage(){ page++; loadMultas(); }
function prevPage(){ if(page>0){ page--; loadMultas(); } }

async function cambiarEstado(id, estado){
    await fetch(`/api/policia/multa/${id}/estado`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({estado})
    });
    loadMultas();
}

async function cargarInfracciones(){
    try {
        let res = await fetch("/api/policia/infracciones");
        let data = await res.json();

        let sel = document.getElementById("codigo");
        sel.innerHTML = '<option value="">Selecciona infracción</option>';

        data.forEach(i => {
            let opt = document.createElement("option");
            opt.value = i.codigo;
            opt.textContent = `${i.codigo} — ${i.descripcion} — ${i.importe}€ — ${i.puntos} pts`;
            sel.appendChild(opt);
        });
    } catch {
        document.getElementById("codigo").innerHTML = '<option>Error cargando</option>';
    }
}

function openModal(){
    document.getElementById("modal").style.display="flex";
    cargarInfracciones(); // 🔥 SIEMPRE carga desde app.py
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

async function crearMulta(){
    let data = {
        matricula: document.getElementById("matricula").value,
        dni: document.getElementById("dni").value,
        codigo_infraccion: document.getElementById("codigo").value,
        agente_num: document.getElementById("agente").value,
        municipio: document.getElementById("municipio").value,
        via: document.getElementById("via").value
    };

    await fetch("/api/policia/multa/nueva", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(data)
    });

    closeModal();
    loadMultas();
}

loadMultas();
</script>

</body>
</html>
